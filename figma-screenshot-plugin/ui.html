<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" /></head>
<body style="margin:0;background:#1e1e1e;color:#888;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;font-size:13px;">
  <span id="msg">در حال بارگذاری...</span>
  <script>
    const APP_URL = "https://raw.githubusercontent.com/imiladco/claude/main/figma-screenshot-plugin/app.html";

    fetch(APP_URL + "?t=" + Date.now())
      .then(function(r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(function(html) {
        document.open();
        document.write(html);
        document.close();
      })
      .catch(function(err) {
        document.getElementById("msg").style.color = "#f87171";
        document.getElementById("msg").textContent = "❌ خطا در بارگذاری: " + err.message;
      });
  </script>
</body>
</html>
